name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build and verify release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine
      - name: Run tests
        run: pytest -q
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: twine check dist/*
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment: pypi
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

# PyPI Trusted Publishing is configured for this workflow and the `pypi`
# environment. Workflow success must still be followed by registry and clean-install verification.
